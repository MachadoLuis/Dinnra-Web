<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <!-- Bootstrap 5.3.6 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styleEmpleados.css}">
</head>
<body>
<div class="container">
    <h1 class="mb-4 special-txt">Gestión de Empleados</h1>

    <!-- Tabla de Empleados -->
    <div class="table-container">
        <h2 class="special-txt">Lista de Empleados</h2>

        <!-- Encabezados de tabla -->
        <div class="table-row-wrapper" style="font-weight: bold; background-color: #f8f9fa;">
            <div class="table-data-container tblHeader">
                <table class="table-data">
                    <thead>
                        <tr class="tbl-header">
                            <th class="special-txt">Apellidos</th>
                            <th class="special-txt">Género</th>
                            <th class="special-txt">Posición</th>
                            <th class="special-txt">Correo</th>
                            <th class="special-txt">Estado</th>
                            <th class="btns-header"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee : ${employees}" th:attr="row-idEmployee=${employee.idEmployee}">
                            <td class="cell-table" th:text="${employee.surnames}"></td>
                            <td class="cell-table" th:text="${employee.gender}"></td>
                            <td class="cell-table" th:text="${employee.positionName}"></td>
                            <td class="cell-table" style="padding: 0.75rem 0 0.75rem 0" th:text="${employee.email}"></td>
                            <td class="cell-status">
                                <span th:class="${employee.active} ? 'badge bg-success' : 'badge bg-secondary'" th:text="${employee.active} ? 'Activo' : 'No activo'"></span>
                            </td>
                            <td class="action-buttons-container">
                                <button class="btn btn-sm btn-outline-primary me-2 btnEdit"  th:attr="edit-idEmployee=${employee.idEmployee}">
                                    <svg width="1.5rem" height="1.5rem" viewBox="0 0 24.00 24.00" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <g id="SVGRepo_iconCarrier">
                                        <path d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H9M15 5H17C18.1046 5 19 5.89543 19 7V9"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M14.902 20.3343L12.7153 20.7716L13.1526 18.585C13.1914 18.3914 13.2865 18.2136 13.4261 18.074L17.5 14L19.5 12L21.4869 13.9869L19.4869 15.9869L15.413 20.0608C15.2734 20.2004 15.0956 20.2956 14.902 20.3343Z"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/> </g>
                                </svg>
                                </button>
                                <button class="btn btn-sm btn-outline-danger btnTrash" th:attr="delete-idEmployee=${employee.idEmployee}">
                                    <svg width="1.5rem" height="1.5rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                                        <g id="SVGRepo_bgCarrier" stroke-width="0"/>

                                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>

                                        <g id="SVGRepo_iconCarrier">
                                            <path d="M4 7H20" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <path d="M6 7V18C6 19.6569 7.34315 21 9 21H15C16.6569 21 18 19.6569 18 18V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/> </g>

                                    </svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
    <div class="form-container">
        <h2 class="special-txt">Registrar Empleado</h2>
        <form Style="padding: 0 0.75rem 0 0.75rem" id="employeeForm" method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label special-txt">Nombres</label>
                    <input id="names" type="text" class="form-control"  required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Apellidos</label>
                    <input id="surnames" type="text"  class="form-control" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label special-txt">Género</label>
                    <div id="gender" class="gender-select">
                        <div class="form-check">
                            <input class="form-check-input input-radio" type="radio" name="gender" id="masculino" value="MASCULINO">
                            <label class="form-check-label" for="masculino">Masculino</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input input-radio" type="radio" name="gender" id="femenino" value="FEMENINO">
                            <label class="form-check-label" for="femenino">Femenino</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input input-radio" type="radio" name="gender" id="otro" value="OTRO">
                            <label class="form-check-label" for="otro">Otro</label>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Fecha de Nacimiento</label>
                    <input id="birthDate" type="date" class="form-control" >
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label special-txt">Correo Electrónico</label>
                    <input id="email" type="email" class="form-control"  required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Teléfono</label>
                    <input id="phone" type="tel" class="form-control" >
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label special-txt">Posición</label>
                    <select id="position" class="form-select form-control" >
                        <option value="">Seleccione una posición</option>
                        <option th:each="position : ${positions}" th:text="${position.name}" th:value="${position.idPosition}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Contraseña</label>
                    <input id="password" type="text"  class="form-control" required>

                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-secondary me-md-2">Limpiar</button>
                <button type="submit" class="btn btn-primary">Guardar Empleado</button>
            </div>
        </form>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Registro exitoso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    El registro de Empleado y la cuenta para el mismo fue exitoso.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="employeeEditModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="employeeModalLabel">Editar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeEditForm" method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Posición</label>
                                <select id="edit-position" class="form-select form-control" required>
                                    <option value="">Seleccione una posición</option>
                                    <option th:each="position : ${positions}"
                                            th:value="${position.idPosition}"
                                            th:text="${position.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Apellidos</label>
                                <input type="text" class="form-control" id="edit-surnames" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Género</label>
                                <div class="gender-select">
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="edit-gender" id="edit-masculino" value="MASCULINO" required>
                                        <label class="form-check-label">Masculino</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="edit-gender" id="edit-femenino" value="FEMENINO">
                                        <label class="form-check-label">Femenino</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="edit-gender" id="edit-otro" value="OTRO">
                                        <label class="form-check-label">Otro</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input form-control" type="checkbox" id="edit-active" style="transform: scale(1.5);">
                                    <label class="form-check-label ms-2">Activo</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-secondary me-md-2">Limpiar</button>
                            <button type="submit" class="btn btn-primary">Editar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="employeeDeleteModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="deleteForm" method="post">
                        <div class="modal-body">¿Realmente desea eliminar a el empleado?</div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary">Si</button>
                            <button type="button" class="btn btn-secondary me-md-2" data-bs-dismiss="modal">No</button>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/script/scriptEmployee.js}"></script>
</body>
</html>
