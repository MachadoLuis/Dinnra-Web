<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
    <style>
        body {
            overflow-x: hidden;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            margin-left: -15rem;
            transition: margin 0.25s ease-out;
        }

        #sidebar-wrapper .sidebar-heading {
            padding: 0.875rem 1.25rem;
            font-size: 1.2rem;
        }

        #sidebar-wrapper .list-group {
            width: 15rem;
        }

        #page-content-wrapper {
            min-width: 100vw;
        }

        .wrapper.toggled #sidebar-wrapper {
            margin-left: 0;
        }

        .list-group-item {
            border: none;
            padding: 0.75rem 1.25rem;
        }

        .list-group-item.active {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }

        .menu-icon {
            margin-right: 10px;
        }

        @media (min-width: 768px) {
            #sidebar-wrapper {
                margin-left: 0;
            }

            #page-content-wrapper {
                min-width: 0;
                width: 100%;
            }

            .wrapper.toggled #sidebar-wrapper {
                margin-left: -15rem;
            }
        }

        iframe {
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
            overflow: auto;
        }
    </style>
</head>
<body>
<div class="d-flex wrapper">
    <!-- Sidebar -->
    <div class="bg-light border-right" id="sidebar-wrapper">
        <div class="sidebar-heading bg-primary text-white">Dashboard</div>

        <div class="list-group list-group-flush">
            <a th:href="@{/admin/employee}" target="content-frame" class="list-group-item list-group-item-action" onclick="setActive(this)">
                <i class="bi bi-person-plus-fill menu-icon"></i>Gestionar Empleados
            </a>
            <!--
            <a th:href="@{/admin/crear_cliente}" target="content-frame" class="list-group-item list-group-item-action" onclick="setActive(this)">
                <i class="bi bi-people-fill menu-icon"></i>Crear Cliente
            </a>-->
            <a th:href="@{/admin/room}" target="content-frame" class="list-group-item list-group-item-action" onclick="setActive(this)">
                <i class="bi bi-door-open-fill menu-icon"></i>Crear Habitación
            </a>
            <a th:href="@{/admin/position}" target="content-frame" class="list-group-item list-group-item-action" onclick="setActive(this)">
                <i class="bi bi-briefcase-fill menu-icon"></i>Crear Posición
            </a>
            <!-- Aquí puedes agregar más opciones de menú en el futuro -->
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
            <div class="container-fluid">
                <button class="btn btn-primary" id="menu-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Inicio</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Usuario
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#">Perfil</a></li>
                                <li><a class="dropdown-item" href="#">Configuración</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a id="clsSession" class="dropdown-item" href="#">Cerrar Sesión</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <iframe id="content-frame" name="content-frame" class="content-area"></iframe>
    </div>
</div>

<!-- Bootstrap core JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("menu-toggle").addEventListener("click", function(e) {
        e.preventDefault();
        document.querySelector(".wrapper").classList.toggle("toggled");
    });

    // Set active menu item
    function setActive(element) {
        // Remove active class from all menu items
        var menuItems = document.querySelectorAll('.list-group-item');
        menuItems.forEach(function(item) {
            item.classList.remove('active');
        });

        // Add active class to clicked menu item
        element.classList.add('active');
    }

    // Set first menu item as active by default
    window.onload = function() {
        document.querySelector('.list-group-item').classList.add('active');
    };
</script>
<script th:src="@{/script/scriptLogout.js}"></script>
<script th:src="@{/script/scriptReSendToken.js}"></script>
</body>
</html>
