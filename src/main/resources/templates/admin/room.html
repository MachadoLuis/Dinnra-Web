<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <!-- Bootstrap 5.3.6 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styleEmpleados.css}">
</head>
<body>
<div class="container">
    <h1 class="mb-4 special-txt">Gestión de Cuartos</h1>

    <!-- Tabla de Empleados -->
    <div class="table-container">
        <h2 class="special-txt">Lista de Cuartos</h2>

        <!-- Encabezados de tabla -->
        <div class="table-row-wrapper" style="font-weight: bold; background-color: #f8f9fa;">
            <div class="table-data-container tblHeader">
                <table class="table-data">
                    <thead>
                    <tr class="tbl-header">
                        <th class="special-txt">Nombe</th>
                        <th class="special-txt">Capacidad</th>
                        <th class="special-txt">Precio</th>
                        <th class="special-txt">Estado</th>
                        <th class="special-txt">Imagen</th>
                        <th class="btns-header"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="room : ${rooms}" th:attr="row-idRoom=${room.idRoom}">
                        <td class="cell-table" th:text="${room.name}"></td>
                        <td class="cell-table" th:text="${room.capacity}"></td>
                        <td class="cell-table" th:text="${room.pricePerNight}"></td>
                        <td class="cell-status">
                            <span th:class="${room.roomStatus} ? 'badge bg-success' : 'badge bg-info'" th:text="${room.roomStatus} ? 'Si' : 'No'"></span>
                        </td>
                        <td class="cell-table" th:text="${room.roomImg}"><img th:src="${room.roomImg}"></td>

                        <td class="action-buttons-container">
                            <button class="btn btn-sm btn-outline-primary me-2 btnEdit"  th:attr="edit-idRoom=${room.idRoom}">
                                <svg width="1.5rem" height="1.5rem" viewBox="0 0 24.00 24.00" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <g id="SVGRepo_iconCarrier">
                                        <path d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H9M15 5H17C18.1046 5 19 5.89543 19 7V9"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M14.902 20.3343L12.7153 20.7716L13.1526 18.585C13.1914 18.3914 13.2865 18.2136 13.4261 18.074L17.5 14L19.5 12L21.4869 13.9869L19.4869 15.9869L15.413 20.0608C15.2734 20.2004 15.0956 20.2956 14.902 20.3343Z"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z"
                                              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/> </g>
                                </svg>
                            </button>
                            <button class="btn btn-sm btn-outline-danger btnTrash" th:attr="delete-idRoom=${room.idRoom}">
                                <svg width="1.5rem" height="1.5rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                                    <g id="SVGRepo_bgCarrier" stroke-width="0"/>

                                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>

                                    <g id="SVGRepo_iconCarrier">
                                        <path d="M4 7H20" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M6 7V18C6 19.6569 7.34315 21 9 21H15C16.6569 21 18 19.6569 18 18V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/> </g>

                                </svg>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
    <div class="form-container">
        <h2 class="special-txt">Registrar Cuarto</h2>
        <form Style="padding: 0 0.75rem 0 0.75rem" id="positionForm" method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label special-txt">Nombre</label>
                    <input id="name" type="text" class="form-control"  required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Amenidades</label>
                    <input id="amenities" type="text" class="form-control"  required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Descripcion</label>
                    <input id="description" type="text" class="form-control"  required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Cantidad de Personas</label>
                    <input id="quantity" type="number"  min="1" max="5" value="1" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label special-txt">Precio por noche</label>
                    <input id="price" type="number"  min="150" max="550" step="50" value="150" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Imagen de la Habitación</label>
                    <input class="form-control" type="file" id="image" accept="image/jpeg, image/png">
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-secondary me-md-2">Limpiar</button>
                <button type="submit" class="btn btn-primary">Guardar Cuarto</button>
            </div>
        </form>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Registro exitoso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    El registro de cuarto fue exitoso.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="positionEditModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="employeeModalLabel">Editar Cuarto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeEditForm" method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="edit-name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Amenidades</label>
                                <input type="text" class="form-control" id="edit-amenities" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Descripcion</label>
                                <input type="text" class="form-control" id="edit-description" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label special-txt">Cantidad de Personas</label>
                                <input id="edit-quantity" type="number"  min="1" max="5" value="1" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label special-txt">Precio por noche</label>
                                <input id="edit-price" type="number"  min="150" max="550" step="50" value="150" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <div id="status" class="status-select">
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="status" id="available" value="DISPONIBLE">
                                        <label class="form-check-label" for="available">Disponible</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="status" id="busy" value="OCUPADO">
                                        <label class="form-check-label" for="busy">Ocupado</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input input-radio" type="radio" name="status" id="maintenance" value="MANTENIMIENTO">
                                        <label class="form-check-label" for="maintenance">Mantenimiento</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="form-label">Imagen</label>
                            <div id="img-cont"></div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-secondary me-md-2">Limpiar</button>
                            <button type="submit" class="btn btn-primary">Editar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="positionDeleteModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar Cuarto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="deleteForm" method="post">
                        <div class="modal-body">¿Realmente desea eliminar este cuarto?</div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary">Si</button>
                            <button type="button" class="btn btn-secondary me-md-2" data-bs-dismiss="modal">No</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/script/scriptRoomAdmin.js}"></script>
</body>
</html>
