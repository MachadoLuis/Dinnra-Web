<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Cuartos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <style>
        .room-card {
            transition: transform 0.3s;
            margin-bottom: 20px;
            height: 100%;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .room-img {
            height: 200px;
            object-fit: cover;
        }
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<header class="container-fluid border-bottom py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <!-- Enlace a la página principal -->
            <a th:href="@{/public/index}" class="text-decoration-none">
                <h2 class="mb-0 text-primary">Dinnra</h2>
            </a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-primary btn-sm">Favoritos</button>
            <!-- Button trigger modal -->
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalClsSession">
                Cerrar Sesion
            </button>
            <button class="btn btn-light btn-sm border"><i class="bi bi-list"></i> Menú</button>
        </div>
    </div>
</header>
<div class="container py-5">
    <h1 class="text-center mb-5">Nuestros Cuartos</h1>

    <!-- Agrupación manual en filas de 3 -->
    <div th:each="rowIndex : ${#numbers.sequence(0, rooms.size()-1, 3)}" class="row g-4">
        <div th:each="room : ${rooms.subList(rowIndex, rowIndex + 3)}" class="col-md-4">
            <div class="card room-card h-100">
                <img th:src="${room.roomImg}" class="card-img-top room-img" alt="Imagen del cuarto">
                <span th:classappend="${room.roomStatus.name() == 'DISPONIBLE' ? 'bg-success' :
                     (room.roomStatus.name() == 'OCUPADO' ? 'bg-danger' : 'bg-warning')}"
                      class="badge status-badge text-white" th:text="${room.roomStatus}">
                </span>
                <div class="card-body">
                    <h5 class="card-title" th:text="${room.name}">Nombre del Cuarto</h5>
                    <p class="card-text"><strong>Precio por noche:</strong>
                        <span class="text-primary" th:text="${'$' + #numbers.formatDecimal(room.pricePerNight, 1, 2)}">$100.00</span>
                    </p>
                    <p class="card-text text-muted" th:text="${room.description}">Descripción breve del cuarto.</p>
                </div>
                <div class="card-footer bg-transparent">
                    <div class="d-grid">
                        <button th:class="btnReservation + (${room.roomStatus.name() =='DISPONIBLE'} ? ' btn btn-primary' : ' btn btn-secondary disabled')"
                                th:attr="idRoom=${room.idRoom}"
                                th:text="${room.roomStatus.name()=='DISPONIBLE'} ? 'Reservar ahora' : 'No disponible'">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalClsSession" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Cierre de Sesion</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                ¿Desea cerrar la sesion?
            </div>
            <div class="modal-footer">
                <button id="clsSession" type="button" class="btn btn-primary">Si, deseo cerrar mi sesion</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<script th:src="@{/script/scriptRoom.js}"></script>
<script th:src="@{/script/scriptShutdownWebSocket.js}"></script>
<script th:src="@{/script/scriptLogout.js}"></script>
</body>
</html>
