<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugerencias - Dinnra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/prueba.css}">
</head>
<body>

<!-- Header -->
<header class="container-fluid border-bottom py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <a href="../public/index.html" class="text-decoration-none">
                <h2 class="mb-0 text-primary">Dinnra</h2>
            </a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-primary btn-sm">Favoritos</button>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
                Iniciar sesión
            </button>
            <button class="btn btn-light btn-sm border"><i class="bi bi-list"></i> Menú</button>
        </div>
    </div>
</header>

<!-- Formulario de sugerencias -->
<section class="py-5">
    <div class="container bg-white shadow rounded p-4">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <h5 class="fw-bold text-primary">Sugerencias</h5>
                <p class="text-muted">Coloque sus sugerencias</p>
                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control bg-light" placeholder="Nombre">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control bg-light" placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control bg-light" rows="4" placeholder="Escriba su sugerencia aquí"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="bg-light border-top py-4">
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <h5 class="fw-bold">Dinnra</h5>
                <p class="text-muted">Somos la mejor página de hoteles 💪</p>
            </div>
            <div class="col-md-4">
                <h5 class="fw-bold">Enlaces</h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-decoration-none text-muted">Acerca de nosotros</a></li>
                    <li><a href="#" class="text-decoration-none text-muted">Política de privacidad</a></li>
                    <li><a href="../html/librodereclamaciones.html" class="text-decoration-none text-muted">Libro de reclamaciones</a></li>
                    <li><a href="#" class="text-decoration-none text-muted">Términos y condiciones</a></li>
                    <li><a href="#" class="text-decoration-none text-muted">Contáctanos</a></li>
                </ul>
            </div>
            <div class="col-md-4">
                <h5 class="fw-bold">Síguenos</h5>
                <div class="d-flex gap-3">
                    <a href="https://www.facebook.com/" class="text-muted"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="https://x.com/home?lang=es" class="text-muted"><i class="bi bi-twitter fs-4"></i></a>
                    <a href="https://www.instagram.com/" class="text-muted"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="https://www.linkedin.com/home/?originalSubdomain=pe" class="text-muted"><i class="bi bi-linkedin fs-4"></i></a>
                </div>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
