<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Cuartos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .room-card {
            transition: transform 0.3s;
            margin-bottom: 20px;
            height: 100%;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .room-img {
            height: 200px;
            object-fit: cover;
        }
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<header class="container-fluid border-bottom py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <!-- Enlace a la página principal -->
            <a th:href="@{/public/index}" class="text-decoration-none">
                <h2 class="mb-0 text-primary">Dinnra</h2>
            </a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-primary btn-sm">Favoritos</button>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
                Iniciar sesión
            </button>
            <button class="btn btn-light btn-sm border"><i class="bi bi-list"></i> Menú</button>
        </div>
    </div>
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <!-- Logo cuadrado en el modal -->
                    <div class="mx-auto text-center w-100">
                        <img src="/img/IMG45.png" alt="Dinnra Logo" style="width: 100px; height: 100px; object-fit: cover; border-radius: 12px;">
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <div class="modal-body">
                    <h2 class="text-center mb-4">Accede a más ahorros como socio</h2>
                    <!-- Botones de Login Social -->
                    <div class="social-login mb-4">
                        <div class="row g-2">
                            <div class="col-sm-4">
                                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="bi bi-google"></i><span>Google</span>
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="bi bi-apple"></i><span>Apple</span>
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="bi bi-facebook"></i><span>Facebook</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Divider -->
                    <div class="position-relative text-center mb-4">
                        <hr>
                        <span style="position: absolute; top: -10px; background-color: #fff; padding: 0 10px; color: #777;">O</span>
                    </div>
                    <!-- Formulario de Login -->
                    <form id= "loginForm">
                        <div class="mb-3">
                            <input type="email" name= "username" class="form-control" placeholder="Correo electrónico" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name = "password" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Recordarme</label>
                            </div>
                            <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
                    </form>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <small>Al iniciar sesión, aceptas nuestro <a href="#">Aviso de privacidad</a> y <a href="#">Términos de uso</a>.</small>
                </div>
            </div>
        </div>
    </div>
</header>
<div class="container py-5">
    <h1 class="text-center mb-5">Nuestros Cuartos</h1>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <!-- Cuarto 1 -->
        <div class="col" th:each="room : ${rooms}" th:if="${roomStat.count <= 3}">
            <div class="card room-card h-100">
                <!-- Imagen del cuarto -->
                <img th:src="${room.imageUrl}" class="card-img-top room-img" alt="Imagen del cuarto">

                <!-- Badge de estado -->
                <span th:classappend="${room.status == 'DISPONIBLE'} ? 'bg-success' :
                                          ${room.status == 'OCUPADO'} ? 'bg-danger' : 'bg-warning'"
                      class="badge status-badge text-white" th:text="${room.status}">
                    </span>

                <div class="card-body">
                    <!-- Nombre del cuarto -->
                    <h5 class="card-title" th:text="${room.name}">Nombre del Cuarto</h5>

                    <!-- Precio por noche -->
                    <p class="card-text">
                        <strong>Precio por noche:</strong>
                        <span class="text-primary" th:text="${'$' + #numbers.formatDecimal(room.pricePerNight, 1, 2)}">$100.00</span>
                    </p>

                    <!-- Descripción (opcional) -->
                    <p class="card-text text-muted" th:text="${room.description}">Descripción breve del cuarto y sus comodidades.</p>
                </div>

                <div class="card-footer bg-transparent">
                    <!-- Botón de reserva -->
                    <div class="d-grid">
                        <button th:classappend="${room.status != 'DISPONIBLE'} ? 'disabled'"
                                class="btn btn-primary" th:text="${room.status == 'DISPONIBLE'} ? 'Reservar ahora' : 'No disponible'">
                            Reservar ahora
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
