<!doctype html>
<!-- TODOS LOS ARCHIVOS CREADOS DEBEN TENER xmlns:th="http://www.thymeleaf.org" -->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/script/review.js}">

    <style>
        .star-rating {
            direction: rtl;
            font-size: 2rem;
            unicode-bidi: bidi-override;
            display: inline-flex;
        }
        .star-rating input[type="radio"] {
            display: none;
        }
        .star-rating label {
            color: #ddd;
            cursor: pointer;
        }
        .star-rating input[type="radio"]:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #f5b301;
        }
    </style>
</head>
<body>
<div class="container my-5" style="max-width: 600px;">
    <h2 class="mb-4 text-center">Deja tu reseña</h2>
    <form id="reviewForm" th:action="@{/usuario/usuario_mis_reservas}" th:method="post">
        <!-- Selección de habitación -->
        <div class="mb-3">
            <label for="roomSelect" class="form-label">Selecciona la habitación</label>
            <select id="roomSelect" name="room" class="form-select" required>
                <option value="">-- Elige una habitación --</option>
                <option value="Casa Andina Select Zorritos">Casa Andina Select Zorritos</option>
                <option value="Mercure Ariosto Lima">Mercure Ariosto Lima</option>
                <option value="Senator Barajas">Senator Barajas</option>
            </select>
        </div>

        <!-- Calificación -->
        <div class="mb-3">
            <label class="form-label">Calificación</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required />
                <label for="star5" title="5 estrellas">&#9733;</label>

                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 estrellas">&#9733;</label>

                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 estrellas">&#9733;</label>

                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 estrellas">&#9733;</label>

                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 estrella">&#9733;</label>
            </div>
        </div>

        <!-- Comentario -->
        <div class="mb-3">
            <label for="comment" class="form-label">Comentario</label>
            <textarea id="comment" name="comment" class="form-control" rows="4" placeholder="Escribe tu opinión..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Enviar Reseña</button>
    </form>
</div>
<!-- Footer -->
<footer class="bg-light border-top py-4">
    <div class="container">
        <div class="row">
            <!-- info -->
            <div class="col-md-4">
                <h5 class="fw-bold">Dinnra</h5>
                <p class="text-muted">Somos la mejor página de hoteles 💪</p>
            </div>
            <!-- enlaces -->
            <div class="col-md-4">
                <h5 class="fw-bold">Enlaces
                </h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-decoration-none text-muted">Acerca de nosotros</a></li>
                    <li><a href="#" class="text-decoration-none text-muted">Política de privacidad</a></li>
                    <li><a th:href="@{/usuario/usuario_libro_reclamaciones}" class="text-decoration-none text-muted">Libro de reclamaciones</a></li>
                    <li><a href="#" class="text-decoration-none text-muted">Términos y condiciones</a></li>
                    <li><a th:href="@{/public/contacto}" class="text-decoration-none text-muted">Contáctanos</a></li>
                </ul>
            </div>
            <!-- redes sociales -->
            <div class="col-md-4">
                <h5 class="fw-bold">Síguenos</h5>
                <div class="d-flex gap-3">
                    <a href="https://www.facebook.com/" class="text-muted"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="https://x.com/home?lang=es" class="text-muted"><i class="bi bi-twitter fs-4"></i></a>
                    <a href="https://www.instagram.com/" class="text-muted"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="https://www.linkedin.com/home/?originalSubdomain=pe" class="text-muted"><i class="bi bi-linkedin fs-4"></i></a>
                </div>
            </div>
        </div>
    </div>
    <div class="text-center mt-4">
        <p class="text-muted mb-0">&copy; 2025 Dinnra. Todos los derechos reservados.</p>
    </div>
</footer>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
