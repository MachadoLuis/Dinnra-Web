<!-- Modal de Login (login.html) -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content login-modal">
        <div class="modal-header border-0">
          <!-- Logo cuadrado en el modal -->
          <div class="logo-square-container mx-auto">S
            <img src="../public/assets/img/IMG45.png" alt="Dinnra Logo" class="logo">
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <h2 class="text-center mb-4">Accede a más ahorros como socio</h2>
          <!-- Botones de Login Social -->
          <div class="social-login mb-4">
            <div class="row g-2">
              <div class="col-sm-4">
                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                  <i class="fab fa-google text-dark"></i><span>Google</span>
                </button>
              </div>
              <div class="col-sm-4">
                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                  <i class="fab fa-apple text-dark"></i><span>Apple</span>
                </button>
              </div>
              <div class="col-sm-4">
                <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                  <i class="fab fa-facebook-f text-dark"></i><span>Facebook</span>
                </button>
              </div>
            </div>
          </div>
          </div>
          <!-- Divider -->
          <div class="divider mb-4">
            <span>O</span>
          </div>
          <!-- Formulario de Login -->
          <form>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <div class="mb-3 form-check d-flex justify-content-between">
              <div>
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Recordarme</label>
              </div>
              <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
          </form>
        </div>
        <div class="modal-footer border-0 justify-content-center">
          <small>Al iniciar sesión, aceptas nuestro <a href="#">Aviso de privacidad</a> y <a href="#">Términos de uso</a>.</small>
        </div>
      </div>
    </div>
  </div>
